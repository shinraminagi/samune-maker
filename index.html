<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サムネメーカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Mochiy+Pop+P+One&family=M+PLUS+1p:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    canvas {
      cursor: crosshair;
    }

    .slider::-webkit-slider-thumb {
      appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .slider::-moz-range-thumb {
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen font-sans">
  <div class="container mx-auto px-2 sm:px-4 py-4 sm:py-8 max-w-6xl">
    <header class="text-center mb-4 sm:mb-8">
      <h1
        class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-slate-800 mb-2 bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent"
        style="font-family: 'Mochiy Pop P One', sans-serif;">
        サムネメーカー
      </h1>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-8">
      <!-- Canvas Section -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-lg p-3 sm:p-6">
          <canvas id="canvas" class="w-full border-2 border-slate-200 rounded-lg shadow-sm"></canvas>
        </div>
      </div>

      <!-- Controls Section -->
      <div class="space-y-4 sm:space-y-6">
        <!-- Text Layer Controls -->
        <div class="bg-white rounded-xl shadow-lg p-3 sm:p-6">
          <div class="flex flex-wrap items-center justify-between gap-2 mb-4">
            <div class="flex flex-wrap gap-2" id="layerTabs"></div>
            <div class="flex gap-2">
              <button id="addLayerBtn" type="button"
                class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition">＋</button>
              <button id="removeLayerBtn" type="button"
                class="px-3 py-2 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 transition">削除</button>
            </div>
          </div>

          <div id="layerSettings" class="space-y-4">
            <div>
              <textarea id="textInput"
                class="w-full p-3 sm:p-4 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none h-24 sm:h-32 text-base sm:text-lg text-slate-700"
                placeholder="ここにテキストを入力してください..."></textarea>
            </div>
            <div>
              <select id="fontSelect"
                class="w-full p-2 sm:p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white text-base sm:text-lg text-slate-700">
                <option value="Mochiy Pop P One">Mochiy Pop P One</option>
                <option value="Noto Sans JP">Noto Sans JP</option>
                <option value="Noto Serif JP">Noto Serif JP</option>
                <option value="Kosugi Maru">Kosugi Maru</option>
                <option value="M PLUS 1p">M PLUS 1p</option>
                <option value="Shippori Mincho">Shippori Mincho</option>
              </select>
            </div>
            <div>
              <div class="flex flex-wrap gap-3 justify-center">
                <label class="inline-flex items-center gap-2 cursor-pointer">
                  <input id="boldCheckbox" type="checkbox"
                    class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                  <span class="text-slate-700">太字</span>
                </label>
                <label class="inline-flex items-center gap-2 cursor-pointer">
                  <input id="italicCheckbox" type="checkbox"
                    class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                  <span class="text-slate-700">斜体</span>
                </label>
                <label class="inline-flex items-center gap-2 cursor-pointer">
                  <input id="underlineCheckbox" type="checkbox"
                    class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                  <span class="text-slate-700">下線</span>
                </label>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">文字色</label>
                <input id="colorInput" type="color" value="#ff0000"
                  class="w-20 h-10 p-0 border border-slate-200 rounded-lg bg-white cursor-pointer">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">文字のフチ</label>
                <div class="flex items-center gap-3">
                  <label class="inline-flex items-center gap-2 cursor-pointer">
                    <input id="strokeCheckbox" type="checkbox" checked
                      class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300">
                  </label>
                  <input id="strokeColorInput" type="color" value="#ffffff"
                    class="w-20 h-10 p-0 border border-slate-200 rounded-lg bg-white cursor-pointer">
                </div>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">
                フォントサイズ: <span id="fontSizeDisplay" class="text-blue-600">100</span>px
              </label>
              <input type="range" id="fontSizeSlider" min="16" max="200" value="100"
                class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer slider">
              <div class="flex justify-between text-xs text-slate-500 mt-1">
                <span>16px</span>
                <span>200px</span>
              </div>
            </div>
            <div>
              <span class="block text-sm font-medium text-slate-700 mb-2">文字揃え</span>
              <div class="flex flex-wrap gap-3">
                <label class="inline-flex items-center gap-2 cursor-pointer">
                  <input id="alignLeft" name="textAlign" type="radio" value="left" checked
                    class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                  <span class="text-slate-700">左</span>
                </label>
                <label class="inline-flex items-center gap-2 cursor-pointer">
                  <input id="alignCenter" name="textAlign" type="radio" value="center"
                    class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                  <span class="text-slate-700">中央</span>
                </label>
                <label class="inline-flex items-center gap-2 cursor-pointer">
                  <input id="alignRight" name="textAlign" type="radio" value="right"
                    class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                  <span class="text-slate-700">右</span>
                </label>
              </div>
            </div>
            <div class="pt-2 border-t border-slate-100">
              <label class="inline-flex items-center cursor-pointer hover:opacity-80 transition-opacity">
                <input type="checkbox" id="showBorderCheckbox" checked
                  class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300">
                <span class="ml-2 text-slate-700 font-medium">テキスト枠を表示</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Background Selection -->
        <div class="bg-white rounded-xl shadow-lg p-3 sm:p-6">
          <h3 class="text-base sm:text-lg font-semibold text-slate-800 mb-3 sm:mb-4 flex items-center">
            <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
              </path>
            </svg>
            背景画像
          </h3>
          <div class="space-y-3">
            <div id="backgroundDropArea"
              class="p-4 rounded-xl border border-dashed border-slate-300 bg-slate-50 text-slate-600">
              <p class="mb-2 text-sm">画像や保存した状態ファイル（JSON）をここにドラッグ＆ドロップ、または画像を貼り付けしてください。</p>
              <label
                class="inline-flex items-center justify-center px-3 py-2 rounded-lg bg-blue-600 text-white cursor-pointer">
                <span>画像を選択</span>
                <input id="customImageInput" type="file" accept="image/*" class="hidden">
              </label>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">
                拡大縮小: <span id="bgScaleDisplay" class="text-blue-600">100</span>%
              </label>
              <input type="range" id="bgScaleSlider" min="10" max="500" value="100"
                class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer slider">
            </div>
          </div>
        </div>

        <!-- Download Button -->
        <div class="space-y-3">
          <button id="downloadBtn"
            class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-3 sm:py-4 px-4 sm:px-6 text-base sm:text-lg rounded-xl shadow-lg transform transition-all duration-200 hover:scale-105 flex items-center justify-center space-x-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
              </path>
            </svg>
            <span>ダウンロード</span>
          </button>
          <div class="flex flex-col sm:flex-row gap-2">
            <button id="saveStateBtn" type="button"
              class="w-full sm:w-auto px-4 py-3 rounded-lg bg-slate-800 text-white hover:bg-slate-900 transition">状態を保存</button>
            <button id="loadStateBtn" type="button"
              class="w-full sm:w-auto px-4 py-3 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200 transition">状態を読み込み</button>
          </div>
          <input id="stateFileInput" type="file" accept="application/json" class="hidden">
        </div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const customImage = new Image();
      let img = null;

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const textInput = document.getElementById('textInput');
      const downloadBtn = document.getElementById('downloadBtn');
      const fontSelect = document.getElementById('fontSelect');
      const colorInput = document.getElementById('colorInput');
      const textAlignInputs = document.querySelectorAll('input[name="textAlign"]');
      const boldCheckbox = document.getElementById('boldCheckbox');
      const italicCheckbox = document.getElementById('italicCheckbox');
      const underlineCheckbox = document.getElementById('underlineCheckbox');
      const strokeCheckbox = document.getElementById('strokeCheckbox');
      const strokeColorInput = document.getElementById('strokeColorInput');
      const fontSizeSlider = document.getElementById('fontSizeSlider');
      const fontSizeDisplay = document.getElementById('fontSizeDisplay');
      const showBorderCheckbox = document.getElementById('showBorderCheckbox');
      const backgroundDropArea = document.getElementById('backgroundDropArea');
      const customImageInput = document.getElementById('customImageInput');
      const saveStateBtn = document.getElementById('saveStateBtn');
      const loadStateBtn = document.getElementById('loadStateBtn');
      const stateFileInput = document.getElementById('stateFileInput');
      const layerTabs = document.getElementById('layerTabs');
      const addLayerBtn = document.getElementById('addLayerBtn');
      const removeLayerBtn = document.getElementById('removeLayerBtn');
      const bgScaleSlider = document.getElementById('bgScaleSlider');
      const bgScaleDisplay = document.getElementById('bgScaleDisplay');

      const THUMBNAIL_WIDTH = 1280;
      const THUMBNAIL_HEIGHT = 720;
      const MOVE_STEP = 20;

      let bgTransform = { scale: 1, offsetX: 0, offsetY: 0 };
      let textLayers = [{
        text: 'みなぎちゃんねる',
        fontFamily: 'Mochiy Pop P One',
        fontSize: 150,
        color: '#ff0000',
        textAlign: 'center',
        bold: false,
        italic: false,
        underline: false,
        strokeEnabled: true,
        strokeColor: '#ffffff',
        showBorder: true,
        rect: { x: 20, y: 460, w: 1240, h: 240 }
      }, {
        text: '1月2日 23:45頃開始',
        fontFamily: 'Kosugi Maru',
        fontSize: 60,
        color: '#ff0000',
        textAlign: 'center',
        bold: true,
        italic: false,
        underline: false,
        strokeEnabled: true,
        strokeColor: '#ffffff',
        showBorder: true,
        rect: { x: 20, y: 20, w: 1240, h: 180 }
      }];
      let activeLayerIndex = 0;
      let isDragging = false, mode = null;
      let startX, startY, offsetX, offsetY;
      let resizeHandle = null;
      let originalRect = null;
      const HANDLE_SIZE = 12;
      const MIN_TEXT_RECT = 40;

      updateCanvasSize();
      resetBackgroundTransform(img);

      function updateCanvasSize() {
        canvas.width = THUMBNAIL_WIDTH;
        canvas.height = THUMBNAIL_HEIGHT;
      }

      function resetBackgroundTransform(image) {
        if (!image) {
          bgTransform.scale = 1;
          bgTransform.offsetX = 0;
          bgTransform.offsetY = 0;
          bgScaleSlider.value = 100;
          bgScaleDisplay.textContent = '100';
          return;
        }
        const fitScale = Math.max(THUMBNAIL_WIDTH / image.width, THUMBNAIL_HEIGHT / image.height);
        bgTransform.scale = fitScale;
        bgTransform.offsetX = (THUMBNAIL_WIDTH - image.width * fitScale) / 2;
        bgTransform.offsetY = (THUMBNAIL_HEIGHT - image.height * fitScale) / 2;
        bgScaleSlider.value = Math.round(fitScale * 100);
        bgScaleDisplay.textContent = bgScaleSlider.value;
      }

      function setBackgroundImage(sourceImage, preserveTransform = false) {
        img = sourceImage;
        if (!preserveTransform) {
          resetBackgroundTransform(img);
        }
        loadFontsAndDraw();
      }

      function getActiveLayer() {
        return textLayers[activeLayerIndex];
      }

      function getResizeHandle(rect, x, y) {
        const points = {
          nw: [rect.x, rect.y],
          ne: [rect.x + rect.w, rect.y],
          sw: [rect.x, rect.y + rect.h],
          se: [rect.x + rect.w, rect.y + rect.h]
        };
        for (const key of Object.keys(points)) {
          const [px, py] = points[key];
          if (Math.abs(px - x) <= HANDLE_SIZE && Math.abs(py - y) <= HANDLE_SIZE) {
            return key;
          }
        }
        return null;
      }

      function updateCanvasCursor(mx, my) {
        const rect = getActiveLayer().rect;
        const handle = getResizeHandle(rect, mx, my);
        if (handle) {
          if (handle === 'nw' || handle === 'se') {
            canvas.style.cursor = 'nwse-resize';
          } else {
            canvas.style.cursor = 'nesw-resize';
          }
          return;
        }

        let hitLayer = null;
        for (let i = textLayers.length - 1; i >= 0; i--) {
          const rect = textLayers[i].rect;
          if (mx > rect.x && mx < rect.x + rect.w && my > rect.y && my < rect.y + rect.h) {
            hitLayer = i;
            break;
          }
        }

        if (hitLayer !== null) {
          canvas.style.cursor = 'move';
        } else if (img) {
          canvas.style.cursor = 'grab';
        } else {
          canvas.style.cursor = 'crosshair';
        }
      }

      function renderLayerTabs() {
        layerTabs.innerHTML = '';
        textLayers.forEach((layer, index) => {
          const tab = document.createElement('button');
          tab.type = 'button';
          tab.textContent = `テキスト ${index + 1}`;
          tab.className = 'px-3 py-2 rounded-lg border transition';
          if (index === activeLayerIndex) {
            tab.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
          } else {
            tab.classList.add('bg-slate-100', 'text-slate-700', 'border-slate-200', 'hover:bg-slate-200');
          }
          tab.addEventListener('click', () => {
            activeLayerIndex = index;
            updateLayerControls();
            drawCanvas(ctx, showBorderCheckbox.checked);
          });
          layerTabs.appendChild(tab);
        });
      }

      function updateLayerControls() {
        const layer = getActiveLayer();
        textInput.value = layer.text;
        fontSelect.value = layer.fontFamily;
        colorInput.value = layer.color || '#000000';
        for (const input of textAlignInputs) {
          input.checked = input.value === (layer.textAlign || 'left');
        }
        boldCheckbox.checked = layer.bold ?? false;
        italicCheckbox.checked = layer.italic ?? false;
        underlineCheckbox.checked = layer.underline ?? false;
        strokeCheckbox.checked = layer.strokeEnabled ?? false;
        strokeColorInput.value = layer.strokeColor || '#ffffff';
        fontSizeSlider.value = layer.fontSize;
        fontSizeDisplay.textContent = layer.fontSize;
        showBorderCheckbox.checked = layer.showBorder;
        renderLayerTabs();
      }

      function loadFontsAndDraw() {
        document.fonts.load(`${fontSizeSlider.value}px "${fontSelect.value}"`).then(() => {
          drawCanvas(ctx, showBorderCheckbox.checked);
        });
      }

      function addLayer() {
        const base = getActiveLayer();
        const newLayer = {
          text: '新しいテキスト',
          fontFamily: base.fontFamily,
          fontSize: base.fontSize,
          color: base.color,
          textAlign: base.textAlign,
          bold: base.bold,
          italic: base.italic,
          underline: base.underline,
          strokeEnabled: base.strokeEnabled,
          strokeColor: base.strokeColor,
          showBorder: base.showBorder,
          rect: {
            x: Math.min(base.rect.x + 20, THUMBNAIL_WIDTH - base.rect.w - 20),
            y: Math.min(base.rect.y + 20, THUMBNAIL_HEIGHT - base.rect.h - 20),
            w: base.rect.w,
            h: base.rect.h
          }
        };
        textLayers.push(newLayer);
        activeLayerIndex = textLayers.length - 1;
        updateLayerControls();
        loadFontsAndDraw();
      }

      function removeLayer() {
        if (textLayers.length <= 1) return;
        textLayers.splice(activeLayerIndex, 1);
        activeLayerIndex = Math.max(0, activeLayerIndex - 1);
        updateLayerControls();
        loadFontsAndDraw();
      }

      addLayerBtn.addEventListener('click', addLayer);
      removeLayerBtn.addEventListener('click', removeLayer);

      updateLayerControls();
      loadFontsAndDraw();

      function getPointerPosition(e, canvas) {
        const r = canvas.getBoundingClientRect();
        const scaleX = canvas.width / r.width;
        const scaleY = canvas.height / r.height;

        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        return {
          x: (clientX - r.left) * scaleX,
          y: (clientY - r.top) * scaleY
        };
      }

      function handleStart(e) {
        if (e.type === 'mousedown' && e.button !== 0) return;
        e.preventDefault();
        const pos = getPointerPosition(e, canvas);
        const mx = pos.x, my = pos.y;

        const activeRect = getActiveLayer().rect;
        const handle = getResizeHandle(activeRect, mx, my);
        if (handle) {
          mode = 'resize';
          resizeHandle = handle;
          originalRect = { ...activeRect };
          startX = mx;
          startY = my;
          isDragging = true;
          return;
        }

        let hitLayer = null;
        for (let i = textLayers.length - 1; i >= 0; i--) {
          const rect = textLayers[i].rect;
          if (mx > rect.x && mx < rect.x + rect.w && my > rect.y && my < rect.y + rect.h) {
            hitLayer = i;
            break;
          }
        }

        if (hitLayer !== null) {
          activeLayerIndex = hitLayer;
          updateLayerControls();
          const rect = getActiveLayer().rect;
          mode = 'move';
          offsetX = mx - rect.x;
          offsetY = my - rect.y;
        } else if (img && !e.shiftKey) {
          mode = 'panBg';
          startX = mx;
          startY = my;
        } else {
          mode = 'new';
          startX = mx; startY = my;
          getActiveLayer().rect = { x: startX, y: startY, w: 0, h: 0 };
        }
        isDragging = true;
      }

      function handleMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        const pos = getPointerPosition(e, canvas);
        const mx = pos.x, my = pos.y;
        const rect = getActiveLayer().rect;

        if (mode === 'move') {
          rect.x = mx - offsetX;
          rect.y = my - offsetY;
        } else if (mode === 'new') {
          rect.w = mx - startX;
          rect.h = my - startY;
        } else if (mode === 'resize' && resizeHandle && originalRect) {
          const min = MIN_TEXT_RECT;
          const orig = originalRect;
          if (resizeHandle === 'nw') {
            rect.x = Math.min(mx, orig.x + orig.w - min);
            rect.y = Math.min(my, orig.y + orig.h - min);
            rect.w = orig.x + orig.w - rect.x;
            rect.h = orig.y + orig.h - rect.y;
          } else if (resizeHandle === 'ne') {
            rect.y = Math.min(my, orig.y + orig.h - min);
            rect.w = Math.max(mx - orig.x, min);
            rect.h = orig.y + orig.h - rect.y;
          } else if (resizeHandle === 'sw') {
            rect.x = Math.min(mx, orig.x + orig.w - min);
            rect.w = orig.x + orig.w - rect.x;
            rect.h = Math.max(my - orig.y, min);
          } else if (resizeHandle === 'se') {
            rect.w = Math.max(mx - orig.x, min);
            rect.h = Math.max(my - orig.y, min);
          }
        } else if (mode === 'panBg' && img) {
          bgTransform.offsetX += mx - startX;
          bgTransform.offsetY += my - startY;
          startX = mx;
          startY = my;
        }
        drawCanvas(ctx, showBorderCheckbox.checked);
      }

      function handleEnd(e) {
        if (!isDragging) return;
        e.preventDefault();
        isDragging = false;
        const rect = getActiveLayer().rect;
        if (mode === 'new') {
          if (rect.w < 0) { rect.x += rect.w; rect.w = -rect.w; }
          if (rect.h < 0) { rect.y += rect.h; rect.h = -rect.h; }
        }
        mode = null;
        resizeHandle = null;
        originalRect = null;
        drawCanvas(ctx, showBorderCheckbox.checked);
      }

      // マウス操作
      canvas.addEventListener('mousedown', handleStart);
      canvas.addEventListener('mousemove', e => {
        if (!isDragging) {
          const pos = getPointerPosition(e, canvas);
          updateCanvasCursor(pos.x, pos.y);
        }
        handleMove(e);
      });
      canvas.addEventListener('mouseup', handleEnd);
      canvas.addEventListener('mouseout', () => {
        canvas.style.cursor = 'crosshair';
      });

      // タッチ操作
      canvas.addEventListener('touchstart', handleStart, { passive: false });
      canvas.addEventListener('touchmove', handleMove, { passive: false });
      canvas.addEventListener('touchend', handleEnd, { passive: false });

      // 共通描画処理
      function drawCanvas(context, showBorder) {
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = 'white';
        context.fillRect(0, 0, canvas.width, canvas.height);
        if (img) {
          context.drawImage(img, bgTransform.offsetX, bgTransform.offsetY, img.width * bgTransform.scale, img.height * bgTransform.scale);
        }

        textLayers.forEach((layer, index) => {
          const rect = layer.rect;
          if (!rect.w || !rect.h) return;

          if (layer.showBorder && showBorder) {
            context.save();
            context.strokeStyle = index === activeLayerIndex ? 'red' : 'rgba(100,116,139,0.65)';
            context.lineWidth = 2;
            context.setLineDash(index === activeLayerIndex ? [6, 4] : []);
            context.strokeRect(rect.x, rect.y, rect.w, rect.h);
            context.restore();
          }

          if (index === activeLayerIndex) {
            const points = [
              [rect.x, rect.y],
              [rect.x + rect.w, rect.y],
              [rect.x, rect.y + rect.h],
              [rect.x + rect.w, rect.y + rect.h]
            ];
            context.save();
            context.fillStyle = 'white';
            context.strokeStyle = '#2563eb';
            context.lineWidth = 2;
            for (const [px, py] of points) {
              context.fillRect(px - HANDLE_SIZE / 2, py - HANDLE_SIZE / 2, HANDLE_SIZE, HANDLE_SIZE);
              context.strokeRect(px - HANDLE_SIZE / 2, py - HANDLE_SIZE / 2, HANDLE_SIZE, HANDLE_SIZE);
            }
            context.restore();
          }

          context.save();
          context.beginPath();
          context.rect(rect.x, rect.y, rect.w, rect.h);
          context.clip();

          const text = layer.text;
          const fontSize = layer.fontSize;
          const lineHeight = fontSize;
          let x0 = rect.x;
          let textAlign = layer.textAlign || 'left';
          if (textAlign === 'center') {
            x0 = rect.x + rect.w / 2;
          } else if (textAlign === 'right') {
            x0 = rect.x + rect.w;
          }
          let y0 = rect.y + lineHeight;
          const fontStyle = `${layer.italic ? 'italic ' : ''}${layer.bold ? 'bold ' : ''}${fontSize}px "${layer.fontFamily}", sans-serif`;
          context.font = fontStyle;
          context.textAlign = textAlign;
          context.fillStyle = layer.color || 'black';
          if (layer.strokeEnabled) {
            context.strokeStyle = layer.strokeColor || 'white';
            context.lineWidth = 15;
            context.lineJoin = 'round';
          }
          const lines = text.split("\n");
          for (const rawLine of lines) {
            let line = '';
            for (const ch of rawLine) {
              const test = line + ch;
              if (context.measureText(test).width > rect.w && line) {
                if (layer.strokeEnabled) context.strokeText(line, x0, y0);
                context.fillText(line, x0, y0);
                line = ch;
                y0 += lineHeight;
              } else {
                line = test;
              }
            }
            if (line) {
              if (layer.strokeEnabled) context.strokeText(line, x0, y0);
              context.fillText(line, x0, y0);
              if (layer.underline) {
                const width = context.measureText(line).width;
                let lineX = x0;
                if (textAlign === 'center') {
                  lineX = x0 - width / 2;
                } else if (textAlign === 'right') {
                  lineX = x0 - width;
                }
                const underlineY = y0 + Math.max(2, fontSize * 0.1);
                context.fillRect(lineX, underlineY, width, Math.max(2, fontSize * 0.08));
              }
              y0 += lineHeight;
            }
          }
          context.restore();
        });
      }

      textInput.addEventListener('input', () => {
        getActiveLayer().text = textInput.value;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      showBorderCheckbox.addEventListener('change', () => {
        getActiveLayer().showBorder = showBorderCheckbox.checked;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });


      function handleImageFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const url = URL.createObjectURL(file);
        customImage.onload = () => {
          URL.revokeObjectURL(url);
          setBackgroundImage(customImage);
        };
        customImage.src = url;
      }

      function handleDrop(event) {
        event.preventDefault();
        const file = event.dataTransfer?.files?.[0];
        if (!file) return;

        const isJson = file.type === 'application/json' || file.name.toLowerCase().endsWith('.json');
        if (isJson) {
          loadStateFromFile(file);
          return;
        }

        handleImageFile(file);
      }

      backgroundDropArea.addEventListener('dragover', e => e.preventDefault());
      backgroundDropArea.addEventListener('drop', handleDrop);
      canvas.addEventListener('dragover', e => e.preventDefault());
      canvas.addEventListener('drop', handleDrop);

      window.addEventListener('paste', e => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            const file = item.getAsFile();
            if (file) {
              handleImageFile(file);
              break;
            }
          }
        }
      });

      customImageInput.addEventListener('change', e => {
        const file = e.target.files?.[0];
        handleImageFile(file);
      });

      bgScaleSlider.addEventListener('input', () => {
        const scale = Number(bgScaleSlider.value) / 100;
        bgTransform.scale = scale;
        bgScaleDisplay.textContent = bgScaleSlider.value;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      fontSelect.addEventListener('change', () => {
        getActiveLayer().fontFamily = fontSelect.value;
        document.fonts.load(`${fontSizeSlider.value}px "${fontSelect.value}"`).then(() => {
          drawCanvas(ctx, showBorderCheckbox.checked);
        });
      });

      colorInput.addEventListener('input', () => {
        getActiveLayer().color = colorInput.value;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      boldCheckbox.addEventListener('change', () => {
        getActiveLayer().bold = boldCheckbox.checked;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      italicCheckbox.addEventListener('change', () => {
        getActiveLayer().italic = italicCheckbox.checked;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      underlineCheckbox.addEventListener('change', () => {
        getActiveLayer().underline = underlineCheckbox.checked;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      for (const input of textAlignInputs) {
        input.addEventListener('change', () => {
          if (input.checked) {
            getActiveLayer().textAlign = input.value;
            drawCanvas(ctx, showBorderCheckbox.checked);
          }
        });
      }

      strokeCheckbox.addEventListener('change', () => {
        getActiveLayer().strokeEnabled = strokeCheckbox.checked;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      strokeColorInput.addEventListener('input', () => {
        getActiveLayer().strokeColor = strokeColorInput.value;
        drawCanvas(ctx, showBorderCheckbox.checked);
      });

      fontSizeSlider.addEventListener('input', () => {
        fontSizeDisplay.textContent = fontSizeSlider.value;
        getActiveLayer().fontSize = Number(fontSizeSlider.value);
        document.fonts.load(`${fontSizeSlider.value}px "${fontSelect.value}"`).then(() => {
          drawCanvas(ctx, showBorderCheckbox.checked);
        });
      });

      downloadBtn.addEventListener('click', () => {
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = canvas.width;
        exportCanvas.height = canvas.height;
        const ectx = exportCanvas.getContext('2d');
        drawCanvas(ectx, false);
        const link = document.createElement('a'); link.download = 'text_image.png';
        link.href = exportCanvas.toDataURL('image/png'); link.click();
      });

      function getStatePayload() {
        let bgDataUrl = null;
        if (img) {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = img.width;
          tempCanvas.height = img.height;
          tempCanvas.getContext('2d').drawImage(img, 0, 0);
          bgDataUrl = tempCanvas.toDataURL('image/png');
        }
        return {
          version: 1,
          bgDataUrl,
          bgTransform,
          textLayers,
          activeLayerIndex
        };
      }

      function saveStateToFile() {
        const payload = getStatePayload();
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'samune-maker-state.json';
        link.click();
        URL.revokeObjectURL(url);
      }

      function loadStateFromFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const payload = JSON.parse(reader.result);
            if (payload.bgDataUrl) {
              customImage.onload = () => {
                bgTransform = payload.bgTransform || bgTransform;
                setBackgroundImage(customImage, !!payload.bgTransform);
              };
              customImage.src = payload.bgDataUrl;
            } else {
              img = null;
              bgTransform = payload.bgTransform || { scale: 1, offsetX: 0, offsetY: 0 };
              loadFontsAndDraw();
            }
            textLayers = payload.textLayers || textLayers;
            activeLayerIndex = Math.min(Math.max(payload.activeLayerIndex || 0, 0), textLayers.length - 1);
            updateLayerControls();
          } catch (error) {
            alert('状態の読み込みに失敗しました。JSON ファイルを確認してください。');
          }
        };
        reader.readAsText(file);
      }

      saveStateBtn.addEventListener('click', saveStateToFile);
      loadStateBtn.addEventListener('click', () => stateFileInput.click());
      stateFileInput.addEventListener('change', e => {
        const file = e.target.files?.[0];
        if (file) {
          loadStateFromFile(file);
        }
        e.target.value = '';
      });
    });
  </script>
</body>
